  <text x="72" y="230" font-size="14" font-weight="700" fill="#C9A24B">1 · EDIT</text>
  <text x="72" y="248" font-size="11.5" fill="#B7AE9C">menja stopu / prag / pravilo</text>
  <text x="72" y="264" font-size="11.5" fill="#B7AE9C">uvek u DRAFT kopiji plana</text>

  <text x="412" y="230" font-size="14" font-weight="700" fill="#C9A24B">2 · SIMULACIJA (obavezna)</text>
  <text x="412" y="248" font-size="11.5" fill="#B7AE9C">pogođeni članovi · Δ isplata / mes</text>
  <text x="412" y="264" font-size="11.5" fill="#B7AE9C">top dobitnici / gubitnici · pre / posle</text>

  <text x="782" y="230" font-size="14" font-weight="700" fill="#C9A24B">3 · PUBLISH &lt; 2s</text>
  <text x="782" y="248" font-size="11.5" fill="#B7AE9C">append-only upis + change_set</text>
  <text x="782" y="264" font-size="11.5" fill="#B7AE9C">ko/kada/šta/zašto → ConfigChanged</text>

  <text x="1122" y="230" font-size="14" font-weight="700" fill="#C9A24B">4 · ROLLBACK</text>
  <text x="1122" y="248" font-size="11.5" fill="#B7AE9C">jedan tap iz istorije promena</text>
  <text x="1122" y="264" font-size="11.5" fill="#B7AE9C">promena unapred — ništa se ne briše</text>

  <line x1="356" y1="244" x2="392" y2="244" stroke="#C9A24B" stroke-width="1.6" marker-end="url(#arrGold)"/>
