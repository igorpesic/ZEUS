  <text x="75" y="1259" font-size="12" font-weight="700" fill="#E8A020" letter-spacing="3">ENGINEERING NOTES — GOD MODE CASCADE</text>

  <text x="56" y="1292" font-size="12.5" fill="#EDEAE2"><tspan fill="#E8A020" font-weight="700">Write path (solid):  </tspan>Philip → God Mode Panel → Config/God Mode Service → Commission Config Store (INSERT new row, effective_from = NOW())</text>
  <text x="56" y="1318" font-size="12.5" fill="#EDEAE2"><tspan fill="#8A6D24" font-weight="700">Propagation (dashed):  </tspan>Config change emits ConfigChanged event → Commission Engine recomputes affected members → Notification Service pushes to members</text>
