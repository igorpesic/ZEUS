  <text x="72" y="414" font-size="13" font-weight="700" fill="#1E2128">plan · plan_activation</text>
  <text x="72" y="433" font-size="11" fill="#6B6256">verzije: P11-2019 · LIVE100-2020 · ZEUS-V1</text>
  <text x="72" y="449" font-size="11" fill="#6B6256">status: draft → published → retired</text>
  <text x="72" y="465" font-size="11" fill="#6B6256">aktivacija po zemlji ('*' = globalni default)</text>
  <text x="72" y="481" font-size="11" fill="#6B6256">zemlja-specifično pobeđuje globalno</text>

  <text x="432" y="414" font-size="13" font-weight="700" fill="#1E2128">rank_ladder</text>
  <text x="432" y="433" font-size="11" fill="#6B6256">rangovi kao config po planu, ne šifarnik</text>
  <text x="432" y="449" font-size="11" fill="#6B6256">5 (Live 100) ili 6 (P11) — engine-u svejedno</text>
  <text x="432" y="465" font-size="11" fill="#6B6256">kvalifikacioni uslovi: JSONB</text>

  <text x="752" y="414" font-size="13" font-weight="700" fill="#8A6D24">earning_rule — SRCE SISTEMA</text>
  <text x="752" y="433" font-size="11" fill="#6B6256">pravilo = primitiv + osnovica + stopa/tabela + uslovi</text>
  <text x="752" y="449" font-size="11" fill="#6B6256">rate_table: {CC:20% · TM:25% · SM:30% · DM:35% · RM:40%}</text>
  <text x="752" y="465" font-size="11" fill="#6B6256">scope: zemlja / rang / nivo · valid_from–to · version</text>
  <text x="752" y="481" font-size="11" fill="#6B6256">svaka izmena = novi red (change_set_id, created_by)</text>

  <text x="1172" y="414" font-size="13" font-weight="700" fill="#1E2128">gates / uslovi</text>
  <text x="1172" y="433" font-size="11" fill="#6B6256">aktivnost &gt; €500/mes</text>
  <text x="1172" y="449" font-size="11" fill="#6B6256">upiši 2 → 20% · upiši 10 → trajno</text>
  <text x="1172" y="465" font-size="11" fill="#6B6256">stimulacija III–V → svi 30%</text>

