  <text x="56" y="1370" font-size="11" fill="#9A9180" font-style="italic">Design constraint: old config rows are NEVER deleted — full audit trail. effective_from timestamp determines which row is active per country per moment.</text>
  <text x="56" y="1392" font-size="11" fill="#6B6256" font-style="italic">Ground-zero · subject to revision · Marketing Plan P11 from 2019 · Ceda to validate service boundaries and event architecture.</text>
  <text x="56" y="1412" font-size="11" fill="#9A9180" font-style="italic">Open question: does God Mode also write directly to Pricing Service overrides, or only via Config Store? Ceda to decide.</text>
