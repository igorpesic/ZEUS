  <text x="412" y="789" font-size="10.5" fill="#6B6256">% na svoju kupovinu/prodaju · popust, prodajna provizija</text>
  <text x="722" y="772" font-size="12.5" font-weight="700" fill="#8A6D24">2 · EVENT_BONUS</text>
  <text x="722" y="789" font-size="10.5" fill="#6B6256">jednokratni okidač · regrutna premija (prva kupovina)</text>
  <text x="412" y="840" font-size="12.5" font-weight="700" fill="#8A6D24">3 · LEVEL_RATE</text>
  <text x="412" y="857" font-size="10.5" fill="#6B6256">% na volumen nivoa L · L1 (Live 100) / L1–L10 (P11)</text>
  <text x="722" y="840" font-size="12.5" font-weight="700" fill="#8A6D24">4 · DIFFERENTIAL</text>
  <text x="722" y="857" font-size="10.5" fill="#6B6256">moja − njegova stopa · diferencijalna / DSC</text>
  <text x="412" y="908" font-size="12.5" font-weight="700" fill="#8A6D24">5 · GATE / MODIFIER</text>
  <text x="412" y="925" font-size="10.5" fill="#6B6256">uslovi: uključi / isključi / override · aktivnost, stimulacioni meseci, broj upisanih</text>

