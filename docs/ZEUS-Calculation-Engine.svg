  <text x="1042" y="795" font-size="11" fill="#6B6256">kombinovanje: 8% + 20% = 28%</text>
  <text x="1042" y="811" font-size="11" fill="#6B6256">capovi · zaokruživanje · valuta</text>
  <text x="1042" y="827" font-size="11" fill="#6B6256">izlaz: stavke sa rule_id + verzijom</text>

