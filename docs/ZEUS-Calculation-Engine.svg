  <text x="72" y="1137" font-size="11" fill="#6B6256">svaki red: rule_id + verzija + plan → pun audit do centa</text>
  <text x="72" y="1153" font-size="11" fill="#6B6256">recompute: stari redovi → superseded</text>
  <text x="72" y="1169" font-size="11" fill="#6B6256">isplaćeno se ne prepisuje — koriguje se sledećim obračunom</text>

