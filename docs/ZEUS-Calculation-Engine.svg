  <line x1="1066" y1="244" x2="1102" y2="244" stroke="#C9A24B" stroke-width="1.6" marker-end="url(#arrGold)"/>
  <text x="75" y="302" font-size="11" fill="#9A9180" font-style="italic">rizične promene (stopa ±X pp ili &gt;N članova) → dvostruka potvrda</text>

