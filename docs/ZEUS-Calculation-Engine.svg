  <text x="75" y="371" font-size="12" font-weight="700" fill="#8A6D24" letter-spacing="3">PLAN DEFINITION — PLAN JE PODATAK, NE KOD</text>
  <text x="1416" y="371" text-anchor="end" font-size="11" fill="#9A9180" font-style="italic">append-only · nema UPDATE · istorijat i rollback ugrađeni</text>

  <g filter="url(#sh)">
    <rect x="56" y="390" width="340" height="116" rx="10" fill="#FFFFFF" stroke="#E2DDD2"/>
